<!DOCTYPE html>
<html>
<head>
    <title>Price Tags</title>
    <style>
        .price-tag {
            width: 100px;
            height: 100px;
            background: red;
            color: white;
            text-align: center;
            line-height: 100px;
            position: relative;
            font-size: 20px;
            border-radius: 10px;
        }
        .price-tag:after {
            content: '';
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-top: 50px solid red;
            position: absolute;
            bottom: -50px;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="price-tag">$99.99</div>
</body>
</html>
